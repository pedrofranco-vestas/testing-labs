name: build-and-test

on:
  push:
    branches-ignore: 
      - 'main'
  pull_request:
    branches-ignore: 
      - 'main'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.gitversion.outputs.SemVer }}
    
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Check az-cli version
      run: |
        az version 

    - name: Login using new method
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        allow-no-subscriptions: true
        # client-id: ${{ secrets.AZURE_CLIENT_ID }}
        # tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        # subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Run az commands
      run: |
        az account show -o table
        az group list -o table
        pwd 

    - name: Setting context
      uses: azure/aks-set-context@v2
      with:
        resource-group: 'aks-dev-rg'
        cluster-name: 'aks-dev-weu'

    - name: Run az commands, again
      run: |
        az aks show -n aks-prd-weu -g aks-prd-rg -o table
        az group list -o table
        pwd 

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v0.9.9
      with:
        versionSpec: '5.x'

    - name: Determine version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v0.9.9
      with: 
        useConfigFile: true
    
    - name: Build
      run: dotnet build --no-restore -c Release -p:Version=${{ steps.gitversion.outputs.SemVer }}
    
    - name: Test
      run: dotnet test --no-build -c Release -r artifacts/test-results/ -l "html;logfilename=helloworld-test-${{ steps.gitversion.outputs.SemVer }}.html" --verbosity normal

    - name: Build artifacts
      run: dotnet publish ./HelloWorld -c Release -r win-x64 --self-contained --nologo --output publish/api/ -p:Version=${{ steps.gitversion.outputs.SemVer }} -p:PublishTrimmed=true

    - name: Name image tag
      run: echo "IMAGE_TAG=hello-world:${{ steps.gitversion.outputs.SemVer }}" >> $GITHUB_ENV

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ${{ env.IMAGE_TAG }}
    
    - name: Store artifacts
      uses: actions/upload-artifact@v2
      with:
        name: hello-world-publish-v${{ steps.gitversion.outputs.SemVer }}
        path: publish/api

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Check Docker images
      run: docker images

    - name: Download math result for job 1
      uses: actions/download-artifact@v3
      with:
        name: hello-world-publish-v${{ needs.build.outputs.version }}
        path: publish/api/

    - name: Create nuget package from publish
      uses: cake-build/cake-action@v1
      with:
        script-path: nuget.cake
        target: Create-Nuget
        verbosity: Diagnostic
        arguments: |
          srcPath: "publish/api/*.*"
          nuspecPath: "./HelloWorld/HelloWorld.nuspec"
          libraryVersion: "${{ needs.build.outputs.version }}"
          nugetOutput: "artifacts/"
    
    - name: Store artifacts
      uses: actions/upload-artifact@v2
      with:
        name: hello-world-v${{ needs.build.outputs.version }}
        path: artifacts/